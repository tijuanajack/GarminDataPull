name: Daily Garmin Blended Weight Sync

on:
  # schedule:
  #   - cron: "0 12 * * *"
  push:
    branches: [main, master]
    paths:
      - "garmin_agent/data/TJ_Standard.json"
      - "garmin_agent/data/TJ_Ath.json"
  pull_request:
    paths:
      - "garmin_agent/data/TJ_Standard.json"
      - "garmin_agent/data/TJ_Ath.json"
  workflow_dispatch:

jobs:
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      GARMIN_TOKEN_CACHE_MODE: readonly
      WEIGHT_STD: "0.6"
      WEIGHT_ATH: "0.4"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Restore Garmin OAuth tokens
        run: |
          mkdir -p garmin_agent/data/.garminconnect
          if [ -n "${{ secrets.GARMIN_TOKENS_JSON }}" ]; then
            cat <<'EOF' > garmin_agent/data/.garminconnect/garmin_tokens.json
          ${{ secrets.GARMIN_TOKENS_JSON }}
          EOF
          fi
          if [ -n "${{ secrets.GARMIN_OAUTH1_TOKEN }}" ]; then
          cat <<'EOF' > garmin_agent/data/.garminconnect/oauth1_token.json
          ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          EOF
          fi
          if [ -n "${{ secrets.GARMIN_OAUTH2_TOKEN }}" ]; then
          cat <<'EOF' > garmin_agent/data/.garminconnect/oauth2_token.json
          ${{ secrets.GARMIN_OAUTH2_TOKEN }}
          EOF
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Run Garmin agent
        run: python garmin_agent/garmin_to_drive.py

      - name: Blend body metrics
        run: python garmin_agent/blend_for_garmin.py

      - name: Push blended body metrics
        run: python garmin_agent/push_blended_using_agent_login.py
