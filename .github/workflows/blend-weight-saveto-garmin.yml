name: Daily Garmin Blended Weight Sync

on:
  schedule:
  - cron: '0 12 * * *'

  push:
    branches: [ main, master ]
    paths:
      - 'garmin_agent/data/TJ_Standard.json'
      - 'garmin_agent/data/TJ_Ath.json'

  pull_request:
    paths:
      - 'garmin_agent/data/TJ_Standard.json'
      - 'garmin_agent/data/TJ_Ath.json'

  workflow_dispatch:

jobs:
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      WEIGHT_STD: '0.6'
      WEIGHT_ATH: '0.4'
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: 📥 Checkout private repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Restore Garmin OAuth tokens
        run: |
          mkdir -p garmin_agent/data/.garminconnect
          cat <<'EOF' > garmin_agent/data/.garminconnect/oauth1_token.json
          ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          EOF
          cat <<'EOF' > garmin_agent/data/.garminconnect/oauth2_token.json
          ${{ secrets.GARMIN_OAUTH2_TOKEN }}
          EOF
      - name: Debug token files
        run: |
          ls -la garmin_agent/data/.garminconnect
      - name: Debug token sizes
        run: |
          wc -c garmin_agent/data/.garminconnect/oauth1_token.json
          wc -c garmin_agent/data/.garminconnect/oauth2_token.json    

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect pandas

      - name: Run Garmin agent (data pull)
        run: python garmin_agent/garmin_to_drive.py

      - name: Blend body metrics
        run: python garmin_agent/blend_for_garmin.py

      - name: Push blended body metrics
        run: python garmin_agent/push_blended_using_agent_login.py
