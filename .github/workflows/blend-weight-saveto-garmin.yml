name: Daily Garmin Blended Sync

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      # Use your repo-local token store
      GARMIN_TOKENSTORE: garmin_agent/data/.garminconnect
      WEIGHT_STD: '0.6'
      WEIGHT_ATH: '0.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tokenstore directory exists
        run: mkdir -p garmin_agent/data/.garminconnect

      - name: Cache Garmin OAuth
        uses: actions/cache@v4
        with:
          path: garmin_agent/data/.garminconnect
          key: garmin-oauth-${{ env.GARMIN_EMAIL }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect

      - name: Blend metrics
        run: python garmin_agent/blend_for_garmin.py

      - name: Push to Garmin with saved OAuth
        run: python garmin_agent/push_blended_with_saved_oauth.py
