name: Daily Garmin Blended Sync

on:
  schedule:
    # 7 AM Central
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    # 12 PM Central
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
    # 5 PM Central
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
    # 10 PM Central (next day UTC)
    - cron: '0 03 * * *'
    - cron: '0 04 * * *'
  workflow_dispatch:

jobs:
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      WEIGHT_STD: '0.6'
      WEIGHT_ATH: '0.4'
      # ensure imports work without needing package install
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: ♻️ Cache Garmin OAuth tokens
        uses: actions/cache@v4
        with:
          path: garmin_agent/data/.garminconnect
          key: garmin-oauth-${{ env.GARMIN_EMAIL }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect pandas

      - name: ▶️ Run Garmin agent (data pull)
        run: python garmin_agent/garmin_to_drive.py

      - name: 🧮 Blend body metrics
        run: python garmin_agent/blend_for_garmin.py

      - name: ⬆️ Push blended body metrics
        run: python garmin_agent/push_blended_using_agent_login.py
