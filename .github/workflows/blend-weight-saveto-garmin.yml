name: Daily Garmin Blended Sync

on:
  schedule:
    # 7 AM Central
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
   
  workflow_dispatch:

jobs:
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      # blend weights (default: standard-weighted)
      WEIGHT_STD: '0.6'
      WEIGHT_ATH: '0.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Garmin OAuth
        uses: actions/cache@v4
        with:
          path: garmin_agent/data/.garminconnect
          key: garmin-oauth-${{ env.GARMIN_EMAIL }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet garminconnect pandas

      # Your existing agent run (kept intact)
      - name: Run Garmin agent
        run: python garmin_agent/garmin_to_drive.py

      # Blend the two JSONs into a Garmin-ready body-comp payload
      - name: Blend body metrics
        run: python garmin_agent/blend_for_garmin.py

      # Push blended body metrics using the same login() your agent uses
      - name: Push blended body metrics
        run: python garmin_agent/push_blended_using_agent_login.py
