name: Renpho latest via hass-renpho

on:
  workflow_dispatch:

jobs:
  pull-renpho:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (empty repo ok)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests tabulate

      - name: Fetch last Renpho measurement
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          RENPHO_USER_ID: ${{ secrets.RENPHO_USER_ID }}
        run: |
          python - <<'PY'
          import os, sys, json, time
          import requests
          from tabulate import tabulate

          email = os.environ.get("RENPHO_EMAIL")
          password = os.environ.get("RENPHO_PASSWORD")
          user_id = os.environ.get("RENPHO_USER_ID") or None

          if not email or not password:
            print("Missing RENPHO_EMAIL or RENPHO_PASSWORD")
            sys.exit(1)

          base = "https://hass-renpho.vercel.app"
          # Try a few likely routes seen on FastAPI projects
          candidates = [
            "/last",
            "/api/last",
            "/v1/last",
            "/renpho/last",
            "/last_measurement",
          ]

          last = None
          used = None
          for path in candidates:
            url = base + path
            try:
              params = {"email": email, "password": password}
              if user_id:
                params["user_id"] = user_id
              r = requests.get(url, params=params, timeout=25)
              # Accept 200 with JSON payload
              if r.status_code == 200:
                try:
                  data = r.json()
                except Exception:
                  continue
                # Accept common shapes
                if isinstance(data, dict) and data:
                  last = data
                  used = url
                  break
                if isinstance(data, list) and data:
                  last = data[0]
                  used = url
                  break
            except Exception:
              continue

          if not last:
            print("Could not fetch last measurement from hosted API.")
            print("Tried routes:", ", ".join(base + p for p in candidates))
            sys.exit(2)

          # Flatten 1-level nested 'data' if present
          if "data" in last and isinstance(last["data"], dict):
            last = last["data"]

          # Sort keys for readability
          items = sorted(last.items(), key=lambda kv: kv[0].lower())
          print(f"Source: {used}")
          print(tabulate(items, headers=["Field", "Value"], tablefmt="github"))

          # Save raw JSON for downstream steps
          with open("renpho_last.json", "w") as f:
            json.dump(last, f, indent=2, ensure_ascii=False)

          PY

      - name: Upload artifact (raw JSON)
        uses: actions/upload-artifact@v4
        with:
          name: renpho-last-json
          path: renpho_last.json
