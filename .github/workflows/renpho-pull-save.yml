name: Renpho export-only (save FIT, no Garmin)

on:
  workflow_dispatch:
    inputs:
      renpho_profile:
        description: Renpho profile name
        required: true
        default: TJ-Ath

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CACHE_DIR: ${{ github.workspace }}/garmin_agent/data
      RGS_EXPORT_ONLY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clone RenphoGarminSync-CLI
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Patch console handler and Garmin API, then build
        working-directory: rgs
        run: |
          python - <<'PY'
          import pathlib, re

          # 1) Console handler: remove all upload call sites and early-return inside the method
          hp = pathlib.Path("RenphoGarminSync.Console/RenphoGarminSyncCommandHandler.cs")
          hs = hp.read_text(encoding="utf-8")

          if "using System.Threading.Tasks;" not in hs:
              hs = hs.replace("using System;", "using System;\nusing System.Threading.Tasks;")

          hs = re.sub(r"\bawait\s+UploadToGarminAsync\s*\([^;]*\);",
                      "/* export-only: skip upload */ await Task.CompletedTask;", hs)
          hs = re.sub(r"(?<!await\s)\bUploadToGarminAsync\s*\([^;]*\);",
                      "/* export-only: skip upload */ _ = Task.CompletedTask;", hs)

          hs = re.sub(r"(async\s+Task\s+UploadToGarminAsync\s*\([^)]*\)\s*\{)",
                      r"\\1\n            // export-only hard stop\n            return;", hs)

          hp.write_text(hs, encoding="utf-8")

          # 2) Garmin API: short-circuit UploadActivity for byte[], Byte[], and Stream overloads
          gp = pathlib.Path("RenphoGarminSync.Garmin.Api/GarminApi.cs")
          gs = gp.read_text(encoding="utf-8")
          if "using System;" not in gs:
              gs = "using System;\n" + gs

          for pattern in [
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*byte\[\]\s*content\s*\)\s*\{)",
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*Byte\[\]\s*content\s*\)\s*\{)",
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*System\.IO\.Stream\s+content\s*\)\s*\{)",
          ]:
              gs = re.sub(pattern,
                          r"\\1\n            if (Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") return;", gs)

          gp.write_text(gs, encoding="utf-8")
          print("Patched handler and API.")

          PY

          dotnet publish ./RenphoGarminSync.Console -c Release -r linux-x64 --self-contained false -o publish
          ls -la publish

      - name: Configure custom cache path
        run: |
          mkdir -p "$CACHE_DIR" "$HOME/Documents/GarminRenphoSync"
          printf '{\n  "UseDefaultCachePath": false,\n  "CustomCachePath": "%s"\n}\n' "${GITHUB_WORKSPACE}/garmin_agent/data" > rgs/config.json
          cp rgs/config.json "$HOME/Documents/GarminRenphoSync/config.json"
          echo "== Effective config.json ==" && cat rgs/config.json

      - name: Renpho auth only
        working-directory: rgs
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: ./publish/rgs auth renpho --u "${RENPHO_EMAIL}" --pw "${RENPHO_PASSWORD}"

      - name: Export latest FIT to cache (dummy --gu, still no Garmin)
        working-directory: rgs
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          PROFILE: ${{ github.event.inputs.renpho_profile }}
        run: ./publish/rgs sync --gu skip --ru "${RENPHO_EMAIL}" --rpw "${RENPHO_PASSWORD}" --renphoProfile "${PROFILE}"

      - name: Parse newest FIT and prepare artifacts
        env:
          CACHE_DIR: ${{ env.CACHE_DIR }}
        run: |
          echo "== Cache listing ==" && ls -la "$CACHE_DIR" || true
          python - <<'PY'
          import os, glob, json, sys
          from fitparse import FitFile

          cache = os.environ["CACHE_DIR"]
          fits = sorted(glob.glob(os.path.join(cache, "*.fit")), key=os.path.getmtime)
          if not fits:
              print("No FIT files found in cache path."); sys.exit(1)
          last = fits[-1]
          print(f"Newest FIT: {last}")

          fit = FitFile(last)
          records = []
          for msg in fit.get_messages():
              for field in msg:
                  try:
                      val = field.value
                  except Exception:
                      val = None
                  records.append({
                      "message": msg.name,
                      "field": field.name,
                      "value": val,
                      "units": getattr(field, "units", None),
                  })

          wanted = {
              "weight","bmi","body_fat","body_water","bone_mass","muscle_mass",
              "visceral_fat","metabolic_age","basal_met","physique_rating",
              "skeletal_muscle_mass","skeletal_muscle_percent"
          }
          print("\nSelected body-comp fields:")
          for r in records:
              if r["field"] in wanted:
                  u = f" {r['units']}" if r.get("units") else ""
                  print(f"- {r['field']}: {r['value']}{u}")

          out_json = os.path.join(cache, "last_fit_all_fields.json")
          with open(out_json, "w") as f:
              json.dump(records, f, indent=2, default=str)
          print(f"\nSaved: {out_json}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: renpho-fit-and-dump
          path: |
            ${{ env.CACHE_DIR }}/*.fit
            ${{ env.CACHE_DIR }}/last_fit_all_fields.json
          if-no-files-found: warn
