name: Renpho export-only (save FIT, no Garmin)

on:
  workflow_dispatch:
    inputs:
      renpho_profile:
        description: Renpho profile name
        required: true
        default: "TJ-Ath"

env:
  CACHE_DIR: ${{ github.workspace }}/garmin_agent/data

jobs:
  export_only:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clone RGS
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      # Tiny patch: adds --export-only and skips Garmin upload. Always saves FIT first.
      - name: Apply export-only patch
        working-directory: rgs
        run: |
          set -euo pipefail

          # --- Patch Program.cs: add --export-only option and pass it to handler ---
          python - <<'PY'
          import io,sys,re
          p = "RenphoGarminSync.Console/Program.cs"
          s = open(p, encoding="utf-8").read()

          # add option definition after garminPassword option
          s = re.sub(
              r'(var garminPassword\s*=.*?\);\s*\n)',
              r"\1            var exportOnly = new Option<bool>(\"--export-only\", description: \"Generate and save FIT files but skip any Garmin upload.\");\n",
              s, flags=re.S
          )

          # include exportOnly in options list for 'sync' command
          s = re.sub(
              r'(var syncOptions\s*=\s*new\s*Option\[\]\s*\{\s*[^}]*?)\};',
              lambda m: (m.group(1) + "\n                exportOnly\n            };"),
              s, flags=re.S
          )

          # add exportOnly parameter to handler and pass to ctor
          s = re.sub(
              r'(?s)sync\.SetHandler\(\s*\(string\s+gu,\s*string\s+gpw,\s*string\s+ru,\s*string\s+rpw,\s*string\s+rprofile,\s*bool\s+dry,\s*bool\s+nofits\)\s*=>\s*\{\s*'
              r'(.*?)'
              r'\}\s*,\s*garminUsername,\s*garminPassword,\s*renphoUsername,\s*renphoPassword,\s*renphoProfile,\s*dryRun,\s*noFitFiles\);',
              lambda m: (
                  'sync.SetHandler((string gu, string gpw, string ru, string rpw, string rprofile, bool dry, bool nofits, bool xonly) => {\n'
                  + re.sub(r'new RenphoGarminSyncCommandHandler\((.*?)\)', r'new RenphoGarminSyncCommandHandler(\1, xonly)', m.group(1), flags=re.S)
                  + '}, garminUsername, garminPassword, renphoUsername, renphoPassword, renphoProfile, dryRun, noFitFiles, exportOnly);'
              ),
              s
          )

          open(p, "w", encoding="utf-8").write(s)
          print("Patched", p)
          PY

          # --- Patch RenphoGarminSyncCommandHandler.cs ---
          python - <<'PY'
          import io,sys,re
          p = "RenphoGarminSync.Console/RenphoGarminSyncCommandHandler.cs"
          s = open(p, encoding="utf-8").read()

          # add field
          if "_exportOnly" not in s:
              s = s.replace(
                  "private readonly bool _noFitFiles;",
                  "private readonly bool _noFitFiles;\n        private readonly bool _exportOnly;"
              )

          # extend constructor signature and assign
          s = re.sub(
              r'public RenphoGarminSyncCommandHandler\(([^)]*?)\)\s*\{',
              lambda m: (
                  "public RenphoGarminSyncCommandHandler(" + m.group(1) + ", bool exportOnly)\n        {\n"
              ),
              s
          )
          if "_exportOnly = exportOnly;" not in s:
              s = s.replace(
                  "_noFitFiles = noFitFiles;",
                  "_noFitFiles = noFitFiles;\n            _exportOnly = exportOnly;"
              )

          # effectiveNoFitFiles
          if "effectiveNoFitFiles" not in s:
              s = s.replace(
                  "public async Task<int> InvokeAsync()\n        {",
                  "public async Task<int> InvokeAsync()\n        {\n            var effectiveNoFitFiles = _exportOnly ? false : _noFitFiles;"
              )

          # require Garmin only when not export-only
          s = s.replace(
              "var renpho = new RenphoApi();",
              "if (!_exportOnly && string.IsNullOrWhiteSpace(_garminUsername))\n                throw new ArgumentException(\"Garmin username/email is required unless --export-only is set.\");\n\n            var renpho = new RenphoApi();"
          )

          # after save, skip upload when export-only
          s = re.sub(
              r'(foreach\s*\(var\s+m\s+in\s+measurements\)\s*\{\s*(?:.|\n)*?)'
              r'await UploadToGarminAsync\(m,\s*_garminUsername,\s*_garminPassword\);\s*',
              lambda m: (
                  re.sub(r'if\s*\(!?_noFitFiles\)', 'if (!effectiveNoFitFiles)', m.group(0))
                  + '\n                if (_exportOnly) continue;\n                '
              ),
              s
          )

          open(p, "w", encoding="utf-8").write(s)
          print("Patched", p)
          PY

      - name: Build RGS
        working-directory: rgs
        run: dotnet publish ./RenphoGarminSync.Console -c Release -r linux-x64 --self-contained false -o publish

      - name: Configure cache path
        run: |
          set -eux
          mkdir -p "${CACHE_DIR}" "${HOME}/Documents/GarminRenphoSync"
          cat > rgs/config.json <<EOF
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${{ env.CACHE_DIR }}"
          }
          EOF
          cp rgs/config.json "${HOME}/Documents/GarminRenphoSync/config.json"
          echo "== config.json ==" && cat rgs/config.json

      - name: Renpho auth
        working-directory: rgs
        env:
          RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: ./publish/rgs auth renpho --u "${RENPHO_EMAIL}" --pw "${RENPHO_PASSWORD}"

      - name: Export latest as FIT only
        working-directory: rgs
        env:
          RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          PROFILE:         ${{ github.event.inputs.renpho_profile }}
        run: |
          ./publish/rgs sync \
            --ru "${RENPHO_EMAIL}" \
            --rpw "${RENPHO_PASSWORD}" \
            --renphoProfile "${PROFILE}" \
            --export-only

      - name: Show cache contents
        run: |
          echo "== Cache =="
          ls -la "${CACHE_DIR}" || true
          echo "== Any FIT under workspace =="
          find "${GITHUB_WORKSPACE}" -type f -name '*.fit' -print || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fitparse
        run: python -m pip install --upgrade pip fitparse

      - name: Parse newest FIT and print all fields
        env:
          CACHE_DIR: ${{ env.CACHE_DIR }}
        run: |
          python - <<'PY'
          import os, glob, json, sys
          from fitparse import FitFile

          cache = os.environ["CACHE_DIR"]
          fits = sorted(glob.glob(os.path.join(cache, "*.fit")), key=os.path.getmtime)
          if not fits:
              print("No FIT files found in cache path."); sys.exit(1)
          last = fits[-1]
          print(f"Newest FIT: {last}")

          fit = FitFile(last)
          records = []
          for msg in fit.get_messages():
              for field in msg:
                  try:
                      val = field.value
                  except Exception:
                      val = None
                  records.append({
                      "message": msg.name,
                      "field": field.name,
                      "value": val,
                      "units": getattr(field, "units", None),
                  })

          wanted = {
              "weight","bmi","body_fat","body_water","bone_mass","muscle_mass",
              "visceral_fat","metabolic_age","basal_met","physique_rating",
              "skeletal_muscle_mass","skeletal_muscle_percent"
          }
          print("\nSelected body-comp fields:")
          for r in records:
              if r["field"] in wanted:
                  units = f" {r['units']}" if r.get("units") else ""
                  print(f"- {r['field']}: {r['value']}{units}")

          out_json = os.path.join(cache, "last_fit_all_fields.json")
          with open(out_json, "w") as f:
              json.dump(records, f, indent=2, default=str)
          print(f"\nSaved: {out_json}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renpho-fit-and-dump
          path: |
            ${{ env.CACHE_DIR }}/*.fit
            ${{ env.CACHE_DIR }}/last_fit_all_fields.json
          if-no-files-found: warn
