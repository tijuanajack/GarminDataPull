name: TJ-Ath → garmin_agent/data (dump all FIT fields)

on:
  workflow_dispatch:

jobs:
  tj_ath_fit_dump:
    runs-on: ubuntu-latest
    env:
      CACHE_DIR: ${{ github.workspace }}/garmin_agent/data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Clone RenphoGarminSync-CLI
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Publish CLI
        working-directory: rgs
        run: |
          dotnet publish ./RenphoGarminSync.Console \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ./publish
          echo "== publish contents =="
          ls -la ./publish

      # 1) Ensure the running binary loads our cache path (write into publish/config.json)
      #    Use unquoted heredoc so $GITHUB_WORKSPACE expands.
      - name: Configure cache path to garmin_agent/data (publish + Documents)
        run: |
          set -eux
          mkdir -p "${CACHE_DIR}"
          mkdir -p "${HOME}/Documents/GarminRenphoSync"

          # publish/config.json (this is the one the binary is most likely to read at runtime)
          cat > "${GITHUB_WORKSPACE}/rgs/publish/config.json" <<JSON
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/garmin_agent/data"
          }
          JSON

          # also drop a copy in Documents as a fallback
          cat > "${HOME}/Documents/GarminRenphoSync/config.json" <<JSON
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/garmin_agent/data"
          }
          JSON

          echo "== rgs/publish/config.json =="
          cat "${GITHUB_WORKSPACE}/rgs/publish/config.json"
          echo "== Documents/GarminRenphoSync/config.json =="
          cat "${HOME}/Documents/GarminRenphoSync/config.json"

      - name: Renpho auth (TJ-Ath)
        working-directory: rgs
        run: ./publish/rgs auth renpho --u "${{ secrets.RENPHO_EMAIL }}" --pw "${{ secrets.RENPHO_PASSWORD }}"

      # 3) SAFEGUARD: If Garmin blocks login (MFA etc), comment out the Garmin auth/upload lines to force 'process + write FIT' only.
      #    This is *surgical*: it only touches the console handler file(s) where those calls are issued.
      - name: Patch console to skip Garmin auth/upload (surgical)
        working-directory: rgs
        shell: bash
        run: |
          set -euxo pipefail
          # Find the console handler(s)
          mapfile -t HANDLERS < <(git grep -l "class RenphoGarminSyncCommandHandler" || true)
          if [ "${#HANDLERS[@]}" -eq 0 ]; then
            # fallback: search by obvious filename patterns
            mapfile -t HANDLERS < <(ls RenphoGarminSync.Console*/**/*.cs 2>/dev/null || true)
          fi

          if [ "${#HANDLERS[@]}" -gt 0 ]; then
            for f in "${HANDLERS[@]}"; do
              echo "Patching $f"
              # Comment out lines that likely do Garmin auth or upload.
              # We are NOT touching models or shared libs. Only the console handler(s).
              sed -i \
                -e 's/^\(\s*\)\(await\s\+.*Garmin.*Authenticate.*\);/\1\/\/ [no-garmin] \2; \/\/ disabled/g' \
                -e 's/^\(\s*\)\(await\s\+.*Upload.*\);/\1\/\/ [no-garmin] \2; \/\/ disabled/g' \
                -e 's/^\(\s*\)\(.*Garmin.*Login.*\);/\1\/\/ [no-garmin] \2; \/\/ disabled/g' \
                -e 's/^\(\s*\)\(.*UploadMeasurements.*\);/\1\/\/ [no-garmin] \2; \/\/ disabled/g' \
                "$f"
              echo "=== post-patch snippet ==="
              sed -n '1,200p' "$f" | sed -n '1,120p'
            done
          else
            echo "No obvious console handler file found; skipping patch step."
          fi

          # Rebuild after patch to make sure it still compiles
          dotnet publish ./RenphoGarminSync.Console \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ./publish

      # 2) Real sync to create FITs.
      #    We pass dummy Garmin creds to satisfy the parser, but the patched console won't call Garmin.
      - name: Sync to create FITs (TJ-Ath, no Garmin calls)
        working-directory: rgs
        env:
          # your Renpho secrets
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: |
          set -euxo pipefail
          rm -f "${CACHE_DIR}/"*.fit || true

          # dummy Garmin creds to satisfy required args; they will not be used post-patch
          ./publish/rgs sync \
            --gu "dummy@example.com" \
            --gpw "dummy-password" \
            --ru "${RENPHO_EMAIL}" \
            --rpw "${RENPHO_PASSWORD}" \
            --renphoProfile "TJ-Ath"

          echo "== Cached files after sync =="
          ls -la "${CACHE_DIR}" || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install fitparse
        run: |
          python -m pip install --upgrade pip
          pip install fitparse

      - name: Dump ALL fields from newest TJ-Ath FIT
        shell: python
        run: |
          import os, glob, sys
          from fitparse import FitFile

          base = os.path.join(os.environ["GITHUB_WORKSPACE"], "garmin_agent", "data")
          candidates = glob.glob(os.path.join(base, "*.fit"))
          if not candidates:
            print("No FIT files found in garmin_agent/data")
            sys.exit(1)

          latest = max(candidates, key=os.path.getmtime)
          print(f"Using latest FIT: {latest}")

          ff = FitFile(latest)
          lines = []
          lines.append(f"# All fields from FIT: {os.path.basename(latest)}")
          for i, msg in enumerate(ff.get_messages(), 1):
            vals = {}
            try:
              vals = {f.name: f.value for f in msg}
            except Exception:
              for field in msg.fields:
                try:
                  vals[field.name] = field.value
                except Exception:
                  vals[field.name] = None
            lines.append(f"\n## Message {i}: {msg.name}")
            for k, v in vals.items():
              lines.append(f"- {k}: {v}")

          with open("tj_ath_last_fit_all_fields.md", "w", encoding="utf-8") as f:
            f.write("\n".join(lines))

          # Echo a trimmed version to logs
          print("\n".join(lines[:2000]))

      - name: Upload FIT and dump
        uses: actions/upload-artifact@v4
        with:
          name: tj-ath-fit-and-dump
          path: |
            garmin_agent/data
            tj_ath_last_fit_all_fields.md
          if-no-files-found: warn
