name: Renpho pull with MFA pause

on:
  workflow_dispatch:

env:
  CACHE_DIR: ${{ github.workspace }}/garmin_agent/data
  RENPHO_PROFILE: TJ-Ath

jobs:
  auth_pw:
    name: Job 1 - Trigger Garmin MFA and stage RGS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clone RGS
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Publish RGS
        working-directory: rgs
        run: |
          dotnet publish ./RenphoGarminSync.Console -c Release -r linux-x64 --self-contained false -o publish
          ls -la publish

      - name: Configure cache path
        run: |
          set -eux
          mkdir -p "${CACHE_DIR}" "${HOME}/Documents/GarminRenphoSync"
          cat > rgs/config.json <<EOF
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${{ env.CACHE_DIR }}"
          }
          EOF
          cp rgs/config.json "${HOME}/Documents/GarminRenphoSync/config.json"
          echo "== config.json ==" && cat rgs/config.json

      - name: Renpho auth
        working-directory: rgs
        env:
          RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: ./publish/rgs auth renpho --u "${RENPHO_EMAIL}" --pw "${RENPHO_PASSWORD}"

      - name: Garmin auth (password only, do not fail if MFA required)
        working-directory: rgs
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          set -x
          ./publish/rgs auth garmin --u "${GARMIN_EMAIL}" --pw "${GARMIN_PASSWORD}" || true
          echo "If MFA is enabled, Garmin should have sent a code to your email."

      - name: Package RGS workspace for Job 2
        run: |
          tar -czf rgs_bundle.tgz rgs garmin_agent

      - name: Upload bundle for Job 2
        uses: actions/upload-artifact@v4
        with:
          name: rgs-bundle
          path: rgs_bundle.tgz

  finish_mfa_and_sync:
    name: Job 2 - Enter MFA, complete auth, pull and parse FIT
    needs: auth_pw
    runs-on: ubuntu-latest
    environment: mfa-gate   # create this Environment once in repo settings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundle from Job 1
        uses: actions/download-artifact@v4
        with:
          name: rgs-bundle

      - name: Unpack
        run: tar -xzf rgs_bundle.tgz

      - name: Complete Garmin MFA
        working-directory: rgs
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}   # set this per run before approval
        run: |
          if [ -z "${GARMIN_MFA_CODE:-}" ]; then
            echo "GARMIN_MFA_CODE environment secret is empty. Set it on the mfa-gate environment, then re-approve."
            exit 1
          fi
          ./publish/rgs auth garmin --u "${GARMIN_EMAIL}" --mfa "${GARMIN_MFA_CODE}"

      - name: Sync Renpho -> FIT (TJ-Ath)
        working-directory: rgs
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: |
          ./publish/rgs sync \
            --gu "${GARMIN_EMAIL}" \
            --gpw "${GARMIN_PASSWORD}" \
            --ru "${RENPHO_EMAIL}" \
            --rpw "${RENPHO_PASSWORD}" \
            --renphoProfile "${{ env.RENPHO_PROFILE }}"

      - name: List cache
        run: |
          echo "== Cache contents =="
          ls -la "${{ env.CACHE_DIR }}" || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fitparse
        run: python -m pip install --upgrade pip fitparse

      - name: Parse newest FIT and print all fields
        env:
          CACHE_DIR: ${{ env.CACHE_DIR }}
        run: |
          python - <<'PY'
          import os, glob, json, sys
          from fitparse import FitFile

          cache = os.environ["CACHE_DIR"]
          fits = sorted(glob.glob(os.path.join(cache, "*.fit")), key=os.path.getmtime)
          if not fits:
              print("No FIT files found in cache path.")
              sys.exit(1)

          last = fits[-1]
          print(f"Newest FIT: {last}")

          fit = FitFile(last)
          records = []
          for msg in fit.get_messages():
              for field in msg:
                  try:
                      val = field.value
                  except Exception:
                      val = None
                  records.append({
                      "message": msg.name,
                      "field": field.name,
                      "value": val,
                      "units": getattr(field, "units", None),
                  })

          out_json = os.path.join(cache, "last_fit_all_fields.json")
          with open(out_json, "w") as f:
              json.dump(records, f, indent=2, default=str)
          print(f"Saved all fields JSON: {out_json}")

          # Print a concise subset if present
          wanted = {
              "weight","bmi","body_fat","body_water","bone_mass","muscle_mass",
              "visceral_fat","metabolic_age","basal_met","physique_rating",
              "skeletal_muscle_mass","skeletal_muscle_percent"
          }
          print("\nSelected body-comp fields:")
          for r in records:
              if r["field"] in wanted:
                  units = f" {r['units']}" if r.get("units") else ""
                  print(f"- {r['field']}: {r['value']}{units}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renpho-fit-and-dump
          path: |
            ${{ env.CACHE_DIR }}/*.fit
            ${{ env.CACHE_DIR }}/last_fit_all_fields.json
          if-no-files-found: warn
