name: Pull Renpho and save FITs (no Garmin upload)

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [ "TJ-Ath", "TJ-Standard" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Clone RenphoGarminSync-CLI
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Publish CLI (linux-x64, framework-dependent)
        working-directory: rgs
        run: |
          dotnet publish ./RenphoGarminSync.Console \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ./publish
          ls -la ./publish

      # Write config.json in BOTH places the app may read from:
      # 1) working dir (rgs/)
      # 2) default Documents path
      - name: Configure cache paths for profile
        run: |
          set -eux
          mkdir -p "${GITHUB_WORKSPACE}/rgs-cache-${{ matrix.profile }}"
          mkdir -p "${HOME}/Documents/GarminRenphoSync"

          cat > "${GITHUB_WORKSPACE}/rgs/config.json" <<'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/rgs-cache-${{ matrix.profile }}"
          }
          JSON

          cat > "${HOME}/Documents/GarminRenphoSync/config.json" <<'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/rgs-cache-${{ matrix.profile }}"
          }
          JSON

          echo "== rgs/config.json =="
          cat "${GITHUB_WORKSPACE}/rgs/config.json" || true
          echo "== Documents/GarminRenphoSync/config.json =="
          cat "${HOME}/Documents/GarminRenphoSync/config.json" || true

      - name: Renpho auth (${{ matrix.profile }})
        working-directory: rgs
        run: ./publish/rgs auth renpho --u "${{ secrets.RENPHO_EMAIL }}" --pw "${{ secrets.RENPHO_PASSWORD }}"

      # Intentionally fail Garmin auth so nothing uploads, but still let Renpho process and write FITs.
      - name: Generate FIT files (no Garmin upload)
        working-directory: rgs
        continue-on-error: true
        run: |
          ./publish/rgs sync \
            --gu "no-upload@example.com" \
            --gpw "bad-password" \
            --ru "${{ secrets.RENPHO_EMAIL }}" \
            --rpw "${{ secrets.RENPHO_PASSWORD }}" \
            --renphoProfile "${{ matrix.profile }}" \
            || true

      # Copy any FITs written to the default Documents path back into workspace cache (belt-and-suspenders)
      - name: Collect FITs into workspace cache
        run: |
          set -eux
          DOCS="${HOME}/Documents/GarminRenphoSync"
          WS="${GITHUB_WORKSPACE}/rgs-cache-${{ matrix.profile }}"
          mkdir -p "$WS"
          if [ -d "$DOCS" ]; then
            find "$DOCS" -type f -name '*.fit' -print -exec cp -n {} "$WS/" \; || true
          fi
          echo "=== Workspace cache contents (${WS}) ==="
          find "$WS" -maxdepth 2 -type f -name '*.fit' -print || true

      - name: Upload FITs and cache artifact (${{ matrix.profile }})
        uses: actions/upload-artifact@v4
        with:
          name: renpho-${{ matrix.profile }}-fit-and-cache
          path: |
            rgs-cache-${{ matrix.profile }}
            rgs/config.json
          if-no-files-found: warn
