name: Renpho Last Pull (TJ-Ath)

on:
  workflow_dispatch:
    inputs:
      renpho_profile:
        description: Renpho profile nickname (for example TJ-Ath)
        required: true
        default: TJ-Ath
      since_days:
        description: How many days back to search
        required: true
        default: "30"

jobs:
  renpho_last:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests tabulate

      - name: Pull latest Renpho record and print metrics
        shell: python
        env:
          RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          RENPHO_USER_ID:  ${{ secrets.R_enphon_user_id }} # opt_
