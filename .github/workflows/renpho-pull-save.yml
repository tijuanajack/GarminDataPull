name: Pull TJ-Ath and display last FIT fields

on:
  workflow_dispatch:

jobs:
  pull_and_display:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Clone RenphoGarminSync-CLI
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Publish CLI (linux-x64, framework-dependent)
        working-directory: rgs
        run: |
          dotnet publish ./RenphoGarminSync.Console \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ./publish
          ls -la ./publish

      # Point RGS cache to a workspace folder and also drop a config in the default Documents path
      - name: Configure cache path
        run: |
          set -eux
          mkdir -p "${GITHUB_WORKSPACE}/rgs-cache-TJ-Ath"
          mkdir -p "${HOME}/Documents/GarminRenphoSync"

          cat > "${GITHUB_WORKSPACE}/rgs/config.json" <<'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/rgs-cache-TJ-Ath"
          }
          JSON

          cat > "${HOME}/Documents/GarminRenphoSync/config.json" <<'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/rgs-cache-TJ-Ath"
          }
          JSON

          echo "== rgs/config.json =="
          cat "${GITHUB_WORKSPACE}/rgs/config.json" || true
          echo "== Documents/GarminRenphoSync/config.json =="
          cat "${HOME}/Documents/GarminRenphoSync/config.json" || true

      - name: Renpho auth
        working-directory: rgs
        run: ./publish/rgs auth renpho --u "${{ secrets.RENPHO_EMAIL }}" --pw "${{ secrets.RENPHO_PASSWORD }}"

      # Real processing required to produce FITs.
      # We intentionally use bogus Garmin creds so nothing uploads.
      # If the tool errors after writing FITs, continue so we can still parse them.
      - name: Generate FITs for TJ-Ath (no Garmin upload)
        working-directory: rgs
        continue-on-error: true
        run: |
          ./publish/rgs sync \
            --gu "no-upload@example.com" \
            --gpw "bad-password" \
            --ru "${{ secrets.RENPHO_EMAIL }}" \
            --rpw "${{ secrets.RENPHO_PASSWORD }}" \
            --rprofile "TJ-Ath" \
            || true

      - name: Show possible FIT locations
        run: |
          echo "=== Workspace cache ==="
          find "${GITHUB_WORKSPACE}/rgs-cache-TJ-Ath" -type f -name '*.fit' -maxdepth 6 -print || true
          echo "=== Default Documents cache ==="
          find "${HOME}/Documents/GarminRenphoSync" -type f -name '*.fit' -maxdepth 6 -print || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install fitparse
        run: |
          python -m pip install --upgrade pip
          pip install fitparse

      # Find the newest TJ-Ath FIT from either cache and print ALL fields
      - name: Display ALL fields from the last TJ-Ath FIT
        shell: python
        run: |
          import os, glob, sys
          from datetime import datetime
          from fitparse import FitFile

          ws_cache = os.path.join(os.environ["GITHUB_WORKSPACE"], "rgs-cache-TJ-Ath")
          docs_cache = os.path.expanduser("~/Documents/GarminRenphoSync")

          # Gather candidates from common places
          candidates = []
          for base in [ws_cache, docs_cache]:
              for pattern in [
                os.path.join(base, "**", "*.fit"),
                os.path.join(base, "fit", "TJ-Ath", "*.fit"),
                os.path.join(base, "TJ-Ath", "*.fit"),
              ]:
                  candidates.extend(glob.glob(pattern, recursive=True))

          if not candidates:
              print("No FIT files found for TJ-Ath in either cache path.")
              sys.exit(0)

          latest = max(candidates, key=os.path.getmtime)
          print(f"Using latest FIT: {latest}")

          ff = FitFile(latest)

          # Dump everything
          lines = []
          lines.append(f"# All fields from FIT: {os.path.basename(latest)}")
          for i, msg in enumerate(ff.get_messages(), 1):
              try:
                  vals = {f.name: f.value for f in msg}
              except Exception:
                  # Some messages may not support iteration like that
                  vals = {}
                  for field in msg.fields:
                      try:
                          vals[field.name] = field.value
                      except Exception:
                          vals[field.name] = None
              lines.append(f"\n## Message {i}: {msg.name}")
              for k, v in vals.items():
                  lines.append(f"- {k}: {v}")

          dump_path = "tj_ath_last_fit_all_fields.md"
          with open(dump_path, "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          # Also echo summary to logs
          print("\n".join(lines[:2000]))  # guard log size

      - name: Upload FIT and field dump
        uses: actions/upload-artifact@v4
        with:
          name: tj-ath-last-fit-and-dump
          path: |
            rgs-cache-TJ-Ath
            tj_ath_last_fit_all_fields.md
          if-no-files-found: warn

