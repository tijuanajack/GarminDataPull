name: Renpho export-only (save FIT, no Garmin)

on:
  workflow_dispatch:
    inputs:
      renpho_profile:
        description: Renpho profile name
        required: true
        default: TJ-Ath

env:
  CACHE_DIR: ${{ github.workspace }}/garmin_agent/data
  RGS_EXPORT_ONLY: "1"

jobs:
  export_only:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clone RenphoGarminSync-CLI
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Show CLI revision
        working-directory: rgs
        run: git log -1 --pretty=oneline

      - name: Patch console handler to disable Garmin upload
        working-directory: rgs
        run: |
          python - <<'PY'
          import pathlib, re

          p = pathlib.Path("RenphoGarminSync.Console/RenphoGarminSyncCommandHandler.cs")
          s = p.read_text(encoding="utf-8")

          if "using System.Threading.Tasks;" not in s:
              s = s.replace("using System;", "using System;\nusing System.Threading.Tasks;")

          # Replace any call to UploadToGarminAsync(...) with a no-op
          s = re.sub(
              r"\bawait\s+UploadToGarminAsync\s*\([^;]*\);",
              "/* export-only: skip upload */ await Task.CompletedTask;",
              s
          )
          s = re.sub(
              r"(?<!await\s)\bUploadToGarminAsync\s*\([^;]*\);",
              "/* export-only: skip upload */ _ = Task.CompletedTask;",
              s
          )

          # Also hard-return at the start of UploadToGarminAsync(...) in case anything slips through
          s = re.sub(
              r"(async\s+Task\s+UploadToGarminAsync\s*\([^)]*\)\s*\{)",
              r"\\1\n            // export-only hard stop\n            return;",
              s
          )

          p.write_text(s, encoding="utf-8")
          print("Patched:", p)
          # Log any remaining references
          for i, line in enumerate(s.splitlines(), 1):
              if "UploadToGarminAsync" in line:
                  print(f"{i:04d}: {line}")
          PY

      - name: Belt and suspenders: short-circuit GarminApi.UploadActivity
        working-directory: rgs
        run: |
          python - <<'PY'
          import pathlib, re
          p = pathlib.Path("RenphoGarminSync.Garmin.Api/GarminApi.cs")
          s = p.read_text(encoding="utf-8")

          if "using System;" not in s:
              s = "using System;\n" + s

          # Short-circuit both byte[] and Byte[] and Stream overloads, if present
          s = re.sub(
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*byte\[\]\s*content\s*\)\s*\{)",
              r"\\1\n            if (Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") return;",
              s
          )
          s = re.sub(
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*Byte\[\]\s*content\s*\)\s*\{)",
              r"\\1\n            if (Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") return;",
              s
          )
          s = re.sub(
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*System\.IO\.Stream\s+content\s*\)\s*\{)",
              r"\\1\n            if (Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") return;",
              s
          )

          p.write_text(s, encoding="utf-8")
          print("Patched:", p)
          PY

      - name: Build CLI
        working-directory: rgs
        run: |
          dotnet publish ./RenphoGarminSync.Console -c Release -r linux-x64 --self-contained false -o publish
          ls -la publish

      - name: Configure custom cache path
        run: |
          set -eux
          mkdir -p "${CACHE_DIR}" "${HOME}/Documents/GarminRenphoSync"
          cat > rgs/config.json <<'EOF'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/garmin_agent/data"
          }
          EOF
          cp rgs/config.json "${HOME}/Documents/GarminRenphoSync/config.json"
          echo "== Effective config.json ==" && cat rgs/config.json

      - name: Renpho auth only
        working-directory: rgs
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: ./publish/rgs auth renpho --u "${RENPHO_EMAIL}" --pw "${RENPHO_PASSWORD}"

      - name: Export latest FIT to cache (dummy --gu, still no Garmin)
        working-directory: rgs
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          PROFILE: ${{ github.event.inputs.renpho_profile }}
        run: |
          ./publish/rgs sync \
            --gu "skip" \
            --ru "${RENPHO_EMAIL}" \
            --rpw "${RENPHO_PASSWORD}" \
            --renphoProfile "${PROFILE}"

      - name: Show cache contents
        run: |
          echo "== Cache listing =="
          ls -la "${CACHE_DIR}" || true
          echo "== Any FIT under workspace =="
          find "${GITHUB_WORKSPACE}" -type f -name '*.fit' -print || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fitparse
        run: python -m pip install --upgrade pip fitparse

      - name: Parse newest FIT and print all fields
        env:
          CACHE_DIR: ${{ env.CACHE_DIR }}
        run: |
          python - <<'PY'
          import os, glob, json, sys
          from fitparse import FitFile

          cache = os.environ["CACHE_DIR"]
          fits = sorted(glob.glob(os.path.join(cache, "*.fit")), key=os.path.getmtime)
          if not fits:
              print("No FIT files found in cache path."); sys.exit(1)
          last = fits[-1]
          print(f"Newest FIT: {last}")

          fit = FitFile(last)
          records = []
          for msg in fit.get_messages():
              for field in msg:
                  try:
                      val = field.value
                  except Exception:
                      val = None
                  records.append({
                      "message": msg.name,
                      "field": field.name,
                      "value": val,
                      "units": getattr(field, "units", None),
                  })

          wanted = {
              "weight","bmi","body_fat","body_water","bone_mass","muscle_mass",
              "visceral_fat","metabolic_age","basal_met","physique_rating",
              "skeletal_muscle_mass","skeletal_muscle_percent"
          }
          print("\nSelected body-comp fields:")
          for r in records:
              if r["field"] in wanted:
                  u = f" {r['units']}" if r.get("units") else ""
                  print(f"- {r['field']}: {r['value']}{u}")

          out_json = os.path.join(cache, "last_fit_all_fields.json")
          with open(out_json, "w") as f:
              json.dump(records, f, indent=2, default=str)
          print(f"\nSaved: {out_json}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renpho-fit-and-dump
          path: |
            ${{ env.CACHE_DIR }}/*.fit
            ${{ env.CACHE_DIR }}/last_fit_all_fields.json
          if-no-files-found: warn
