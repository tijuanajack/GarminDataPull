- name: Sync to create a FIT then kill quickly
  working-directory: rgs
  env:
    GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
    RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
    RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
  run: |
    set -euxo pipefail
    CACHE_DIR="${GITHUB_WORKSPACE}/garmin_agent/data"
    rm -f "${CACHE_DIR}/"*.fit || true

    ./publish/rgs sync \
      --gu "${GARMIN_EMAIL}" \
      --ru "${RENPHO_EMAIL}" --rpw "${RENPHO_PASSWORD}" \
      --renphoProfile "TJ-Ath" &
    RGS_PID=$!

    # Wait up to 300s for a FIT to appear
    for _ in $(seq 1 300); do
      if ls "${CACHE_DIR}/"*.fit >/dev/null 2>&1; then
        echo "FIT detected. Terminating rgs PID=${RGS_PID}"
        kill "${RGS_PID}" || true
        sleep 2
        kill -9 "${RGS_PID}" || true
        break
      fi
      sleep 1
    done

    echo "== Cached files =="
    ls -la "${CACHE_DIR}" || true
    echo "== Workspace tree (first 200 lines) =="
    find "${GITHUB_WORKSPACE}" -maxdepth 4 -type f | sed -n '1,200p'
    echo "== Any .fit anywhere under workspace =="
    find "${GITHUB_WORKSPACE}" -type f -name '*.fit' -print || true

