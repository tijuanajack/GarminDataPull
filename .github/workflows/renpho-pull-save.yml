name: Pull Renpho and save FIT files

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore RGS cache
        uses: actions/cache@v4
        with:
          path: rgs-cache
          key: rgs-cache-v1

      - name: Clone RenphoGarminSync-CLI
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Point RGS to custom cache folder
        working-directory: rgs
        run: |
          mkdir -p "$GITHUB_WORKSPACE/rgs-cache"
          cat > config.json << 'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${{ github.workspace }}/rgs-cache"
          }
          JSON

      # Publish a framework-dependent build (no RID, no trimming)
      - name: Publish CLI (portable)
        working-directory: rgs
        run: dotnet publish ./RenphoGarminSync.Console -c Release -o ./publish

      - name: Verify Renpho auth
        working-directory: rgs
        run: dotnet ./publish/RenphoGarminSync.Console.dll auth renpho --u "${{ secrets.RENPHO_EMAIL }}" --pw "${{ secrets.RENPHO_PASSWORD }}"

      # Generate FIT files without uploading to Garmin
      - name: Pull newest and save FIT files (no upload)
        working-directory: rgs
        run: dotnet ./publish/RenphoGarminSync.Console.dll sync \
               --gu "placeholder" --gpw "placeholder" \
               --ru "${{ secrets.RENPHO_EMAIL }}" --rpw "${{ secrets.RENPHO_PASSWORD }}" \
               --dry-run

      - name: List generated files for debug
        if: always()
        run: |
          echo "=== rgs-cache contents ==="
          find rgs-cache -maxdepth 3 -type f -printf "%P\n" || true

      - name: Upload FIT files and cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renpho-fit-and-cache
          path: |
            rgs-cache
            rgs/config.json
