name: Renpho export-only (save FIT, no Garmin)

on:
  workflow_dispatch:
    inputs:
      renpho_profile:
        description: Renpho profile name
        required: true
        default: "TJ-Ath"

env:
  CACHE_DIR: ${{ github.workspace }}/garmin_agent/data
  RGS_EXPORT_ONLY: "1"   # hard guard to disable any Garmin upload

jobs:
  export_only:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clone RGS
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Replace Program.cs with export-only aware version
        working-directory: rgs
        run: |
          cat > RenphoGarminSync.Console/Program.cs <<'CS'
          using System;
          using System.CommandLine;
          using System.Threading.Tasks;

          namespace RenphoGarminSync.ConsoleApp
          {
              internal static class Program
              {
                  public static async Task<int> Main(string[] args)
                  {
                      var root = new RootCommand("RenphoGarminSync CLI");

                      var auth = new Command("auth", "Authenticate with services");

                      // auth renpho
                      var renpho = new Command("renpho", "Authenticate with Renpho");
                      var renphoUser = new Option<string>("--u") { IsRequired = true };
                      var renphoPass = new Option<string>("--pw") { IsRequired = true };
                      renpho.AddOption(renphoUser);
                      renpho.AddOption(renphoPass);
                      renpho.SetHandler(async (string u, string pw) =>
                      {
                          var h = new RenphoGarminSync.Console.RenphoAuthCommandHandler(u, pw);
                          await h.InvokeAsync();
                      }, renphoUser, renphoPass);

                      // auth garmin (kept for completeness; unused in export-only flow)
                      var garmin = new Command("garmin", "Authenticate with Garmin");
                      var garminUser = new Option<string>("--u") { IsRequired = true };
                      var garminPass = new Option<string?>("--pw");
                      var garminMfa  = new Option<string?>("--mfa");
                      garmin.AddOption(garminUser);
                      garmin.AddOption(garminPass);
                      garmin.AddOption(garminMfa);
                      garmin.SetHandler(async (string u, string? pw, string? mfa) =>
                      {
                          var h = new RenphoGarminSync.Console.GarminAuthCommandHandler(u, pw, mfa);
                          await h.InvokeAsync();
                      }, garminUser, garminPass, garminMfa);

                      auth.AddCommand(renpho);
                      auth.AddCommand(garmin);
                      root.AddCommand(auth);

                      // sync
                      var sync = new Command("sync", "Sync Renpho measurements (and optionally upload to Garmin)");

                      var gu = new Option<string>("--garminUsername"); gu.AddAlias("--gu");
                      var gpw = new Option<string?>("--garminPassword"); gpw.AddAlias("--gpw");
                      var ru = new Option<string>("--renphoUsername") { IsRequired = true }; ru.AddAlias("--ru");
                      var rpw = new Option<string>("--renphoPassword") { IsRequired = true }; rpw.AddAlias("--rpw");
                      var rprofile = new Option<string>("--renphoProfile"); rprofile.AddAlias("--rprofile");
                      var dryRun = new Option<bool>("--dry-run");
                      var noFitFiles = new Option<bool>("--no-fit-files");
                      var exportOnly = new Option<bool>("--export-only", "Write FIT files but skip Garmin upload");

                      sync.AddOption(gu);
                      sync.AddOption(gpw);
                      sync.AddOption(ru);
                      sync.AddOption(rpw);
                      sync.AddOption(rprofile);
                      sync.AddOption(dryRun);
                      sync.AddOption(noFitFiles);
                      sync.AddOption(exportOnly);

                      sync.SetHandler(async (string guv, string? gpwv, string ruv, string rpwv, string rprof, bool dry, bool nofits, bool xonly) =>
                      {
                          var handler = new RenphoGarminSync.ConsoleApp.RenphoGarminSyncCommandHandler(guv, gpwv, ruv, rpwv, rprof, dry, nofits, xonly);
                          await handler.InvokeAsync();
                      }, gu, gpw, ru, rpw, rprofile, dryRun, noFitFiles, exportOnly);

                      root.AddCommand(sync);
                      return await root.InvokeAsync(args);
                  }
              }
          }
          CS

      - name: Patch handler to honor --export-only
        working-directory: rgs
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("RenphoGarminSync.Console/RenphoGarminSyncCommandHandler.cs")
          s = p.read_text(encoding="utf-8")

          # add field
          if "_exportOnly" not in s:
              s = s.replace(
                  "private readonly bool _noFitFiles;",
                  "private readonly bool _noFitFiles;\n        private readonly bool _exportOnly;"
              )

          # extend constructor signature and assign
          s = re.sub(
              r"public\s+RenphoGarminSyncCommandHandler\(([^)]*?)\)\s*\{",
              r"public RenphoGarminSyncCommandHandler(\1, bool exportOnly)\n        {",
              s
          )
          if "_exportOnly = exportOnly;" not in s:
              s = s.replace(
                  "_noFitFiles = noFitFiles;",
                  "_noFitFiles = noFitFiles;\n            _exportOnly = exportOnly;"
              )

          # effectiveNoFitFiles at top of InvokeAsync
          if "effectiveNoFitFiles" not in s:
              s = s.replace(
                  "public async Task<int> InvokeAsync()\n        {",
                  "public async Task<int> InvokeAsync()\n        {\n            var effectiveNoFitFiles = _exportOnly || (Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") ? false : _noFitFiles;"
              )

          # require Garmin only when not export-only
          if "Garmin username/email is required unless --export-only is set." not in s:
              s = s.replace(
                  "var renpho = new RenphoApi();",
                  "if (!(_exportOnly || Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") && string.IsNullOrWhiteSpace(_garminUsername))\n                throw new ArgumentException(\"Garmin username/email is required unless --export-only is set.\");\n\n            var renpho = new RenphoApi();"
              )

          # ensure we save FIT using effectiveNoFitFiles and skip upload when export-only
          s = re.sub(
              r"foreach\s*\(var\s+m\s+in\s+measurements\)\s*\{([\s\S]*?)\}",
              lambda m: (
                  "foreach (var m in measurements)\n            {\n"
                  + re.sub(r"if\s*\(\s*!_noFitFiles\s*\)", "if (!effectiveNoFitFiles)", m.group(1), flags=re.S)
                    .replace("await UploadToGarminAsync(m, _garminUsername, _garminPassword);",
                             "if (_exportOnly || Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") { continue; }\n                await UploadToGarminAsync(m, _garminUsername, _garminPassword);")
                  + "\n            }"
              ),
              s, count=1
          )

          p.write_text(s, encoding="utf-8")
          print("Patched", p)
          PY

      - name: Patch GarminApi to no-op UploadActivity when export-only
        working-directory: rgs
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("RenphoGarminSync.Garmin.Api/GarminApi.cs")
          s = p.read_text(encoding="utf-8")

          # Ensure System is imported
          if "using System;" not in s:
              s = "using System;\n" + s

          # Short-circuit the byte[] overload
          s = re.sub(
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*Byte\[\]\s*content\s*\)\s*\{)",
              r"\\1\n            if (Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") return;",
              s
          )

          # Also short-circuit a possible Stream overload, if present
          s = re.sub(
              r"(public\s+async\s+Task\s+UploadActivity\s*\(\s*string\s+fileName\s*,\s*System\.IO\.Stream\s+content\s*\)\s*\{)",
              r"\\1\n            if (Environment.GetEnvironmentVariable(\"RGS_EXPORT_ONLY\") == \"1\") return;",
              s
          )

          p.write_text(s, encoding="utf-8")
          print("Patched", p)
          PY

      - name: Build RGS
        working-directory: rgs
        run: dotnet publish ./RenphoGarminSync.Console -c Release -r linux-x64 --self-contained false -o publish

      - name: Configure cache path
        run: |
          set -eux
          mkdir -p "${CACHE_DIR}" "${HOME}/Documents/GarminRenphoSync"
          cat > rgs/config.json <<EOF
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${{ env.CACHE_DIR }}"
          }
          EOF
          cp rgs/config.json "${HOME}/Documents/GarminRenphoSync/config.json"
          echo "== config.json ==" && cat rgs/config.json

      - name: Renpho auth
        working-directory: rgs
        env:
          RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: ./publish/rgs auth renpho --u "${RENPHO_EMAIL}" --pw "${RENPHO_PASSWORD}"

      - name: Export latest as FIT only
        working-directory: rgs
        env:
          RENPHO_EMAIL:    ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          PROFILE:         ${{ github.event.inputs.renpho_profile }}
        run: |
          ./publish/rgs sync \
            --ru "${RENPHO_EMAIL}" \
            --rpw "${RENPHO_PASSWORD}" \
            --renphoProfile "${PROFILE}" \
            --export-only

      - name: Show cache contents
        run: |
          echo "== Cache =="
          ls -la "${CACHE_DIR}" || true
          echo "== Any FIT under workspace =="
          find "${GITHUB_WORKSPACE}" -type f -name '*.fit' -print || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fitparse
        run: python -m pip install --upgrade pip fitparse

      - name: Parse newest FIT and print all fields
        env:
          CACHE_DIR: ${{ env.CACHE_DIR }}
        run: |
          python - <<'PY'
          import os, glob, json, sys
          from fitparse import FitFile

          cache = os.environ["CACHE_DIR"]
          fits = sorted(glob.glob(os.path.join(cache, "*.fit")), key=os.path.getmtime)
          if not fits:
              print("No FIT files found in cache path."); sys.exit(1)
          last = fits[-1]
          print(f"Newest FIT: {last}")

          fit = FitFile(last)
          records = []
          for msg in fit.get_messages():
              for field in msg:
                  try:
                      val = field.value
                  except Exception:
                      val = None
                  records.append({
                      "message": msg.name,
                      "field": field.name,
                      "value": val,
                      "units": getattr(field, "units", None),
                  })

          wanted = {
              "weight","bmi","body_fat","body_water","bone_mass","muscle_mass",
              "visceral_fat","metabolic_age","basal_met","physique_rating",
              "skeletal_muscle_mass","skeletal_muscle_percent"
          }
          print("\nSelected body-comp fields:")
          for r in records:
              if r["field"] in wanted:
                  units = f" {r['units']}" if r.get("units") else ""
                  print(f"- {r['field']}: {r['value']}{units}")

          out_json = os.path.join(cache, "last_fit_all_fields.json")
          with open(out_json, "w") as f:
              json.dump(records, f, indent=2, default=str)
          print(f"\nSaved: {out_json}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renpho-fit-and-dump
          path: |
            ${{ env.CACHE_DIR }}/*.fit
            ${{ env.CACHE_DIR }}/last_fit_all_fields.json
          if-no-files-found: warn
