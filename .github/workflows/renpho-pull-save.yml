name: Pull Renpho (TJ-Ath) and save FIT + report

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PROFILE: "TJ-Ath"
  CACHE_DIR: "${{ github.workspace }}/garmin_agent/data"
  SKIP_GARMIN_UPLOAD: "1"   # our shim key to bypass Garmin upload

jobs:
  pull:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK and runtime
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Clone RenphoGarminSync-CLI
        run: |
          git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Ensure cache dirs and config
        run: |
          set -eux
          mkdir -p "${CACHE_DIR}"
          mkdir -p "${HOME}/Documents/GarminRenphoSync"

          # rgs config to force cache into CACHE_DIR
          cat > rgs/config.json <<'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/garmin_agent/data"
          }
          JSON

          # Some builds read from Documents/GarminRenphoSync/config.json too
          cat > "${HOME}/Documents/GarminRenphoSync/config.json" <<'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${GITHUB_WORKSPACE}/garmin_agent/data"
          }
          JSON

          echo "== rgs/config.json =="
          cat rgs/config.json
          echo "== Documents/GarminRenphoSync/config.json =="
          cat "${HOME}/Documents/GarminRenphoSync/config.json"

      - name: Add "skip Garmin upload" extension and patch call sites
        working-directory: rgs
        run: |
          set -eux

          # 1) Add a tiny extension method that no-ops uploads if SKIP_GARMIN_UPLOAD=1
          cat > RenphoGarminSync.Console/UploadActivitySafe.cs <<'CS'
          using System;
          using System.Threading.Tasks;
          using RenphoGarminSync.Garmin.Api;

          namespace RenphoGarminSync.ConsoleApp
          {
              public static class GarminApiUploadSafeExtensions
              {
                  public static Task UploadActivitySafe(this GarminApi api, string fileName, byte[] content)
                  {
                      var skip = Environment.GetEnvironmentVariable("SKIP_GARMIN_UPLOAD");
                      if (skip == "1")
                      {
                          Console.WriteLine($"[skip] Would upload {fileName} to Garmin. Skipping as requested.");
                          return Task.CompletedTask;
                      }
                      return api.UploadActivity(fileName, content);
                  }
              }
          }
          CS

          # 2) Replace calls to UploadActivity( with UploadActivitySafe(
          #    This keeps the upstream code intact and only changes call sites at compile time.
          grep -RIl --exclude-dir=bin --exclude-dir=obj 'UploadActivity(' RenphoGarminSync.Console | xargs -r sed -i 's/UploadActivity(/UploadActivitySafe(/g'

      - name: Build CLI (linux-x64)
        working-directory: rgs/RenphoGarminSync.Console
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained false -o ../publish

      - name: Auth Renpho (seeds session)
        working-directory: rgs
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: |
          set -eux
          ./publish/rgs auth renpho --u "${RENPHO_EMAIL}" --pw "${RENPHO_PASSWORD}"

      - name: Pull and save latest FIT for TJ-Ath (Garmin upload is skipped)
        working-directory: rgs
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          SKIP_GARMIN_UPLOAD: ${{ env.SKIP_GARMIN_UPLOAD }}
        run: |
          set -eux
          # Clean any stale *.fit
          rm -f "${CACHE_DIR}"/*.fit || true

          # Pass a placeholder Garmin username to satisfy the CLI's required option.
          # Upload calls will be no-oped by our extension.
          ./publish/rgs sync \
            --gu "placeholder@example.com" \
            --ru "${RENPHO_EMAIL}" \
            --rpw "${RENPHO_PASSWORD}" \
            --renphoProfile "${PROFILE}"

          echo "== Cached files =="
          ls -la "${CACHE_DIR}"

      - name: Set up Python for FIT parsing
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fitparse
        run: |
          python -m pip install --upgrade pip fitparse

      - name: Parse latest FIT and print all fields
        env:
          CACHE_DIR: ${{ env.CACHE_DIR }}
        run: |
          python - <<'PY'
          import os, glob, json
          from fitparse import FitFile

          cache = os.environ["CACHE_DIR"]
          fits = sorted(glob.glob(os.path.join(cache, "*.fit")), key=os.path.getmtime)
          if not fits:
              print(f"No FIT files found in {cache}")
              raise SystemExit(1)

          last = fits[-1]
          print(f"Parsing: {last}")

          fit = FitFile(last)
          fit.parse()

          # Collect all fields from the last body_composition message
          latest_msg = None
          for msg in fit.get_messages():
              if msg.name == "body_composition":
                  latest_msg = msg

          rows = []
          if latest_msg:
              row = {}
              for d in latest_msg:
                  row[d.name] = d.value
              rows.append(row)

          # Fallback: no specific body_composition found, collect last record
          if not rows:
              for msg in reversed(list(fit.get_messages("record"))):
                  row = {}
                  for d in msg:
                      row[d.name] = d.value
                  rows.append(row)
                  break

          # Write a human readable and a JSON file
          md = [f"# Latest TJ-Ath body composition from FIT", "", f"Source file: `{os.path.basename(last)}`", ""]
          if rows:
              md.append("## Fields")
              for k, v in sorted(rows[0].items()):
                  md.append(f"- {k}: {v}")
          else:
              md.append("_No body composition fields found_")

          md_path = os.path.join(cache, "latest_fit_report.md")
          json_path = os.path.join(cache, "latest_fit_report.json")
          with open(md_path, "w") as f:
              f.write("\n".join(md))
          with open(json_path, "w") as f:
              json.dump(rows[0] if rows else {}, f, indent=2)

          print("\n".join(md))
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renpho-fit-and-report
          path: |
            garmin_agent/data/*.fit
            garmin_agent/data/latest_fit_report.md
            garmin_agent/data/latest_fit_report.json
