name: Pull Renpho and display metrics (no Garmin upload)

on:
  workflow_dispatch:

env:
  BLEND_STD_WEIGHT: "0.6"
  BLEND_ATH_WEIGHT: "0.4"

jobs:
  pull:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [ "TJ-Ath", "TJ-Standard" ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore cache for ${{ matrix.profile }}
        uses: actions/cache@v4
        with:
          path: rgs-cache-${{ matrix.profile }}
          key: rgs-cache-${{ matrix.profile }}-v1

      - name: Clone RenphoGarminSync-CLI
        run: git clone https://github.com/forkerer/RenphoGarminSync-CLI.git rgs

      - name: Write config.json pointing to profile cache
        working-directory: rgs
        run: |
          mkdir -p "${{ github.workspace }}/rgs-cache-${{ matrix.profile }}"
          cat > config.json << 'JSON'
          {
            "UseDefaultCachePath": false,
            "CustomCachePath": "${{ github.workspace }}/rgs-cache-${{ matrix.profile }}"
          }
          JSON

      - name: Publish CLI
        working-directory: rgs
        run: |
          dotnet publish ./RenphoGarminSync.Console \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ./publish
          ls -la ./publish

      - name: Renpho auth (${{ matrix.profile }})
        working-directory: rgs
        run: ./publish/rgs auth renpho --u "${{ secrets.RENPHO_EMAIL }}" --pw "${{ secrets.RENPHO_PASSWORD }}"

      # Create FIT files but prevent Garmin upload by using bad Garmin creds.
      # This step may end with a non zero exit code because Garmin login fails.
      # continue-on-error lets the job proceed so we can still use the FIT files.
      - name: Generate FIT files (no Garmin upload)
        working-directory: rgs
        continue-on-error: true
        run: |
          ./publish/rgs sync \
            --gu "no-upload@example.com" --gpw "bad-password" \
            --ru "${{ secrets.RENPHO_EMAIL }}" --rpw "${{ secrets.RENPHO_PASSWORD }}" \
            --renphoProfile "${{ matrix.profile }}"

      - name: List generated FIT files (${{ matrix.profile }})
        run: |
          echo "=== rgs-cache-${{ matrix.profile }} FIT files ==="
          find "rgs-cache-${{ matrix.profile }}" -type f -name '*.fit' -maxdepth 6 -print || true

      - name: Upload profile artifact (${{ matrix.profile }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renpho-${{ matrix.profile }}-fit-and-cache
          path: |
            rgs-cache-${{ matrix.profile }}
            rgs/config.json

  display:
    runs-on: ubuntu-latest
    needs: pull
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Inspect downloaded artifacts
        run: |
          echo "=== artifacts tree ==="
          find artifacts -maxdepth 3 -type d -print || true
          echo "=== files ==="
          find artifacts -maxdepth 4 -type f -print || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install parser
        run: |
          python -m pip install --upgrade pip
          pip install fitparse

      - name: Display latest metrics and blended summary
        env:
          BLEND_STD_WEIGHT: ${{ env.BLEND_STD_WEIGHT }}
          BLEND_ATH_WEIGHT: ${{ env.BLEND_ATH_WEIGHT }}
        shell: python
        run: |
          import os, glob
          from datetime import timezone
          from zoneinfo import ZoneInfo
          from fitparse import FitFile

          base = os.path.abspath("artifacts")
          profiles = ["TJ-Ath", "TJ-Standard"]

          def get(d, *names, cast=float):
              for n in names:
                  if n in d and d[n] is not None:
                      try:
                          return cast(d[n])
                      except Exception:
                          return d[n]
              return None

          def parse_latest(profile):
              fit_dir = os.path.join(base, f"renpho-{profile}-fit-and-cache", f"rgs-cache-{profile}")
              fits = glob.glob(os.path.join(fit_dir, "**", "*.fit"), recursive=True)
              latest = None
              latest_ts = None
              for path in fits:
                  try:
                      ff = FitFile(path)
                      record, ts = {}, None
                      for m in ff.get_messages():
                          data = {f.name: f.value for f in m}
                          if "timestamp" in data and data["timestamp"] is not None:
                              ts = data["timestamp"]
                          record.update(data)
                      if ts is not None and (latest_ts is None or ts > latest_ts):
                          latest_ts = ts
                          latest = (os.path.basename(path), record, ts)
                  except Exception:
                      continue
              if not latest:
                  return None
              fname, record, ts = latest
              return {
                  "profile": profile,
                  "source_fit": fname,
                  "timestamp_utc": ts.astimezone(timezone.utc),
                  "weight_kg": get(record, "weight", "body_weight", "weight_kg"),
                  "bmi": get(record, "bmi"),
                  "body_fat_pct": get(record, "body_fat_percentage", "percent_fat", "body_fat"),
                  "body_water_pct": get(record, "hydration_percentage", "body_water", "percent_hydration"),
                  "muscle_mass_kg": get(record, "muscle_mass", "muscle_mass_kg"),
                  "skeletal_muscle_pct": get(record, "skeletal_muscle_percentage", "skeletal_muscle"),
                  "bone_mass_kg": get(record, "bone_mass", "bone_mass_kg"),
                  "visceral_fat_rating": get(record, "visceral_fat_rating", "visceral_fat"),
                  "bmr_kcal": get(record, "basal_met", "bmr", "basal_metabolic_rate"),
                  "metabolic_age": get(record, "metabolic_age"),
              }

          data = {p: parse_latest(p) for p in profiles}
          std = data.get("TJ-Standard")
          ath = data.get("TJ-Ath")

          w_std = float(os.getenv("BLEND_STD_WEIGHT", "0.6"))
          w_ath = float(os.getenv("BLEND_ATH_WEIGHT", "0.4"))

          def blend(std_val, ath_val):
              if std_val is None and ath_val is None:
                  return None
              if std_val is None:
                  return round(float(ath_val), 2)
              if ath_val is None:
                  return round(float(std_val), 2)
              return round(w_std * float(std_val) + w_ath * float(ath_val), 2)

          weight_kg = blend(std and std["weight_kg"], ath and ath["weight_kg"])
          bmi = blend(std and std["bmi"], ath and ath["bmi"])
          body_fat_pct = blend(std and std["body_fat_pct"], ath and ath["body_fat_pct"])
          body_water_pct = blend(std and std["body_water_pct"], ath and ath["body_water_pct"])
          muscle_mass_kg = blend(std and std["muscle_mass_kg"], ath and ath["muscle_mass_kg"])
          skeletal_muscle_pct = blend(std and std["skeletal_muscle_pct"], ath and ath["skeletal_muscle_pct"])
          bone_mass_kg = blend(std and std["bone_mass_kg"], ath and ath["bone_mass_kg"])
          visceral_fat_rating = blend(std and std["visceral_fat_rating"], ath and ath["visceral_fat_rating"])
          bmr_kcal = blend(std and std["bmr_kcal"], ath and ath["bmr_kcal"])
          metabolic_age = blend(std and std["metabolic_age"], ath and ath["metabolic_age"])
          skeletal_muscle_mass_kg = round(weight_kg * (skeletal_muscle_pct/100.0), 2) if weight_kg and skeletal_muscle_pct else None

          def fmt_ts(dct):
              if not dct or not dct.get("timestamp_utc"):
                  return "n/a"
              return dct["timestamp_utc"].astimezone(ZoneInfo("America/Chicago")).strftime("%Y-%m-%d %H:%M:%S %Z")

          def line(label, val):
              return f"- {label}: {val if val is not None else 'n/a'}"

          lines = []
          lines.append("# Renpho body composition summary")
          lines.append("")
          lines.append(f"Blend weights: Standard={w_std}, Athlete={w_ath}")
          lines.append("")

          for label, d in [("TJ-Standard", std), ("TJ-Ath", ath)]:
              lines.append(f"## {label}")
              if not d:
                  lines.append("No recent FIT found")
                  lines.append("")
                  continue
              lines.extend([
                  line("Timestamp", fmt_ts(d)),
                  line("Weight kg", d.get("weight_kg")),
                  line("BMI", d.get("bmi")),
                  line("Body Fat %", d.get("body_fat_pct")),
                  line("Body Water %", d.get("body_water_pct")),
                  line("Muscle Mass kg", d.get("muscle_mass_kg")),
                  line("Skeletal Muscle %", d.get("skeletal_muscle_pct")),
                  line("Bone Mass kg", d.get("bone_mass_kg")),
                  line("Visceral Fat Rating", d.get("visceral_fat_rating")),
                  line("BMR kcal/day", d.get("bmr_kcal")),
                  line("Metabolic Age", d.get("metabolic_age")),
                  ""
              ])

          lines.append("## Blended metrics")
          lines.extend([
              line("Weight kg", weight_kg),
              line("Muscle Mass kg", muscle_mass_kg),
              line("Skeletal Muscle Mass kg", skeletal_muscle_mass_kg),
              line("Skeletal Muscle %", skeletal_muscle_pct),
              line("Bone Mass kg", bone_mass_kg),
              line("Visceral Fat Rating", visceral_fat_rating),
              line("Body Fat %", body_fat_pct),
              line("Body Water %", body_water_pct),
              line("BMI", bmi),
              line("Basal Metabolic Rate kcal/day", bmr_kcal),
              line("Metabolic Age years", metabolic_age),
          ])

          md = "\n".join(lines)
          print("\n" + md + "\n")
          with open("renpho_blended_metrics.md", "w", encoding="utf-8") as f:
              f.write(md)

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: renpho-blended-metrics
          path: renpho_blended_metrics.md
