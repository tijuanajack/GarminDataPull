name: Daily Garmin Sync

on:
  schedule:
    - cron: '15 10 * * *'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas git+https://github.com/cyberjunky/python-garminconnect.git

    - name: Run Garmin script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      run: |
        python garmin_agent/garmin_to_drive.py

    - name: Copy summary to fixed filename
      run: |
        latest_file=$(ls -t garmin_agent/data/garmin_summary_*.csv | head -n 1)
        cp "$latest_file" garmin_agent/data/latest_summary.csv

    - name: Commit and push updated summary in private repo
      run: |
        git config user.name github-actions
        git config user.email actions@github.com
        git add garmin_agent/data/*.csv
        git commit -m "🔄 Update Garmin summary for $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

    - name: Push to public repo (garmin-health-data)
      run: |
        git clone https://tijuanajack:${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}@github.com/tijuanajack/garmin-health-data.git public-repo
        cp garmin_agent/data/latest_summary.csv public-repo/
        cd public-repo
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add latest_summary.csv
        git commit -m "📊 Update latest Garmin summary"
        git push
