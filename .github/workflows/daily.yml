
name: Daily Garmin Sync

on:
  schedule:
    - cron: '17 5 * * *'   # 05:17 UTC daily
  workflow_dispatch:

jobs:
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}

    steps:
      - name: 🛎️ Checkout private repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install deps
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet garminconnect pandas

      - name: ▶️ Run data agent
        run: python garmin_agent/garmin_to_drive.py

      # commit summary into *this* (private) repo
      - name: 📝 Commit CSVs to private repo
        env:    
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # built-in token, already present
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add garmin_agent/data/*.csv
          git commit -m "🔄 update summary $(date +'%Y-%m-%d')" || echo "no changes"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main


      # push latest_summary.csv to public repo
      - name: 🚀 Push latest_summary.csv to public repo
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/tijuanajack/garmin-health-data.git public
          cp garmin_agent/data/latest_summary.csv public/
          cd public
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add latest_summary.csv
          git commit -m "📊 update $(date +'%Y-%m-%d')" || echo "no changes"
          git push
