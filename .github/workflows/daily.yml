name: Daily Garmin Sync

# This workflow runs your Garmin data collection script once a day and
# optionally uploads the results to Google Drive.  It exposes
# sensitive information (email, password and optional Google credentials)
# via repository secrets so that your credentials are not stored in
# plaintext in your repository.

on:
  schedule:
    # Run every day at 09:00 UTC (03:00 America/Chicago)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab
    {}

jobs:
  run-script:
    runs-on: ubuntu-latest
    # Propagate secrets into environment variables expected by the script
    env:
      GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Garmin API client
          pip install git+https://github.com/cyberjunky/python-garminconnect.git
          # Data processing
          pip install pandas
          # Google Drive API (optional but installed regardless)
          pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Run Garmin data collection
        run: |
          python garmin_agent/garmin_to_drive.py