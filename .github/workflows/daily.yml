name: Daily Garmin Sync

on:
  schedule:
    - cron: "0 12 * * *"   # 08:00 CDT (Mar-Nov)
    - cron: "0 13 * * *"   # 08:00 CST (Nov-Mar)
  workflow_dispatch:

jobs:
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      GARMIN_TOKEN_CACHE_MODE: readonly
      GARMIN_TOKEN_STORE_DIR: ${{ github.workspace }}/../.garminconnect

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Restore Garmin OAuth tokens
        run: |
          mkdir -p "${GARMIN_TOKEN_STORE_DIR}"
          cat <<'EOF' > "${GARMIN_TOKEN_STORE_DIR}/garmin_tokens.json"
          ${{ secrets.GARMIN_TOKENS_JSON }}
          EOF

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Run Garmin agent
        run: python garmin_agent/garmin_to_drive.py

      - name: Commit CSVs to private repo
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add garmin_agent/data/*.csv
          git diff --cached --quiet && exit 0
          git commit -m "update summary $(date +'%Y-%m-%d')"
          git fetch https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git main
          git rebase FETCH_HEAD
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git HEAD:main

      - name: Push latest_summary.csv to public repo
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/tijuanajack/garmin-health-data.git public
          cp garmin_agent/data/latest_summary.csv public/
          cd public
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest_summary.csv
          git diff --cached --quiet && exit 0
          git commit -m "update $(date +'%Y-%m-%d')"
          git push
