name: 🕓 Daily Garmin Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  sync-garmin-data:
    runs-on: ubuntu-latest

    env:
      GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ▶️ Run Garmin Data Agent
        run: |
          python garmin_agent/garmin_to_drive.py

      - name: 📤 Commit summary CSVs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add garmin_agent/data/garmin_summary_*.csv garmin_agent/data/latest_summary.csv || true
          git commit -m "🔄 Update Garmin summary for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push https://tijuanajack:${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}@github.com/tijuanajack/garmin-health-data.git HEAD:main
