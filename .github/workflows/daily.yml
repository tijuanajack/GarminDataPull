name: Daily Garmin Data Pull

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect google-api-python-client pandas

      - name: 🔐 Set up Git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: ▶️ Run Garmin script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
        run: |
          python garmin_agent/garmin_to_drive.py

      - name: 📤 Commit and push summary
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        run: |
          git pull
          git add garmin_agent/data/*.csv || echo "No new CSV files to commit."
          git diff --cached --quiet || (git commit -m "🔄 Update Garmin summary for $(date +'%Y-%m-%d')" && git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git HEAD:main)
