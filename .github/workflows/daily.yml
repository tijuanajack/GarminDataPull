name: Daily Garmin Sync

on:
  schedule:
    # 7 AM Central
    - cron: '0 12 * * *'   # 08:00 CDT  (Mar–Nov)
    - cron: '0 13 * * *'   # 08:00 CST  (Nov–Mar)

    # 12 PM Central
    - cron: '0 17 * * *'   # 12:00 CDT
    - cron: '0 18 * * *'   # 12:00 CST

    # 5 PM Central
    - cron: '0 22 * * *'   # 17:00 CDT
    - cron: '0 23 * * *'   # 17:00 CST

    # 10 PM Central
    - cron: '0 03 * * *'   # 22:00 CDT → 03:00 UTC (next day)
    - cron: '0 04 * * *'   # 22:00 CST → 04:00 UTC (next day)

  workflow_dispatch:

jobs:
  concurrency:
    group: garmin-sync    cancel-in-progress: false
  garmin:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}

    steps:
      - name: 📥 Checkout private repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install deps
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet garminconnect pandas openai>=1.12.0
      - name: ▶️ Run Garmin agent
        run: python garmin_agent/garmin_to_drive.py

      - name: 📝 Commit CSVs to private repo
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_PUSH_TOKEN }}
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add garmin_agent/data/*.csv
          git commit -m "🔄 update summary $(date +'%Y-%m-%d')" || echo "no changes"

          # 🔑 FIX: sync with remote before push
          git pull --rebase https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git main
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git HEAD:main


      - name: 🚀 Push latest_summary.csv to public repo
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/tijuanajack/garmin-health-data.git public
          cp garmin_agent/data/latest_summary.csv public/
          cd public
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add latest_summary.csv
          git commit -m "📊 update $(date +'%Y-%m-%d')" || echo "no changes"
          git push
