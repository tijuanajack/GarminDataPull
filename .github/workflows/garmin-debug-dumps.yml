name: Garmin Debug Dumps

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days of activities to dump"
        required: false
        default: "14"

jobs:
  dumps:
    runs-on: ubuntu-latest
    env:
      GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
      GARMIN_TOKEN_CACHE_MODE: readonly
      GARMIN_TOKEN_STORE_DIR: ${{ runner.temp }}/.garminconnect
      DAYS_ACTIVITIES: ${{ github.event.inputs.days }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Run raw activities dump
        run: python garmin_agent/dump_raw_activities.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: garmin-dumps
          path: |
            garmin_agent/data/activities_list.json
            garmin_agent/data/activities_details.json

      - name: Commit dumps to repo
        if: ${{ always() }}
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add garmin_agent/data/activities_list.json garmin_agent/data/activities_details.json
          git diff --cached --quiet && exit 0
          git commit -m "debug dumps $(date +'%Y-%m-%dT%H:%M:%S')"
          git fetch https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git main
          git rebase FETCH_HEAD
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git HEAD:main
